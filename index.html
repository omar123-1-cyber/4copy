<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-slate-800">Job Application Tracker</h1>
    
    <div class="stats shadow w-full mb-6 grid grid-cols-3">
        <div class="stat"><div class="stat-title">Total</div><div class="stat-value" id="totalCount">8</div></div>
        <div class="stat"><div class="stat-title">Interview</div><div class="stat-value text-green-600" id="interviewCount">0</div></div>
        <div class="stat"><div class="stat-title">Rejected</div><div class="stat-value text-red-600" id="rejectedCount">0</div></div>
    </div>

    <div class="flex gap-2 mb-6">
        <button class="btn btn-primary" onclick="filterJobs('ALL')">ALL</button>
        <button class="btn btn-success text-white" onclick="filterJobs('INTERVIEW')">INTERVIEW</button>
        <button class="btn btn-error text-white" onclick="filterJobs('REJECTED')">REJECTED</button>
    </div>

    <div id="jobList" class="space-y-4"></div>
</div>

<script>
    //card bananor jonno data gula ekta array te rakhlam...jate coed gula clean thake...
    let jobs = [
        { id: 1, company: "Mobile First Corp", role: "React Native Developer", info: "Remote . Full-time", status: "NOT APPLIED" },
        { id: 2, company: "WebFlow Agency", role: "Web Designer", info: "Onsite . Part-time", status: "NOT APPLIED" },
        { id: 3, company: "DataViz Solutions", role: "Data Analyst", info: "Hybrid . Full-time", status: "NOT APPLIED" },
        { id: 4, company: "Cloud Net", role: "Backend Engineer", info: "Remote . Full-time", status: "NOT APPLIED" },
        { id: 5, company: "FinTech Hub", role: "Security Expert", info: "Remote . Contract", status: "NOT APPLIED" },
        { id: 6, company: "Pixel Studio", role: "Frontend Dev", info: "Remote . Full-time", status: "NOT APPLIED" },
        { id: 7, company: "GameZone", role: "Unity Developer", info: "Onsite . Full-time", status: "NOT APPLIED" },
        { id: 8, company: "DevOps Co", role: "System Admin", info: "Remote . Full-time", status: "NOT APPLIED" }
    ];

    let activeFilter = 'ALL';

    function renderJobs() {
        const list = document.getElementById('jobList');
        list.innerHTML = '';
        
        const filteredJobs = activeFilter === 'ALL' ? jobs : jobs.filter(j => j.status === activeFilter);
        
        // jodi filter kora list khali hoy tahole ekta message dekhabe...
        if (filteredJobs.length === 0) {
            list.innerHTML = `
            <div class="card bg-white p-20 shadow-sm border text-center">
                <p class="text-gray-500 font-semibold text-lg">No jobs available</p>
            </div>`;
            return;
        }
        
        filteredJobs.forEach(job => {
            list.innerHTML += `
            <div class="card bg-white p-6 shadow-sm border relative">
                <button onclick="deleteJob(${job.id})" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition">
                    <i class="fas fa-trash-alt"></i>
                </button>
                
                <h2 class="text-xl font-bold">${job.company}</h2>
                <p class="text-gray-500">${job.role}</p>
                <p class="text-sm text-gray-400 mt-1">${job.info}</p>
                
                <div class="mt-4">
                    <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded uppercase">
                        ${job.status}
                    </span>
                </div>
                
                <div class="flex gap-3 mt-5">
                    <button class="btn btn-outline btn-success btn-sm" onclick="updateStatus(${job.id}, 'INTERVIEW')">INTERVIEW</button>
                    <button class="btn btn-outline btn-error btn-sm" onclick="updateStatus(${job.id}, 'REJECTED')">REJECTED</button>
                </div>
            </div>`;
        });
    }

    
</script>
</body>
</html>
